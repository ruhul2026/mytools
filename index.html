<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>my services</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Hind Siliguri', sans-serif;
            background-image: url('ruhul.jpeg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 1100px;
            text-align: center;
            margin-top: 20px;
        }
        h1 { color: #fff; text-shadow: 2px 2px 4px rgba(0,0,0,0.6); margin-bottom: 20px; }
        
        .menu-bar {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 20px;
            border-radius: 50px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            margin-bottom: 25px;
        }
        .menu-bar a {
            text-decoration: none;
            color: #2c3e50;
            font-weight: 600;
            font-size: 15px;
            padding: 8px 18px;
            border-radius: 20px;
            transition: 0.3s;
            cursor: pointer;
        }
        .menu-bar a:hover { background-color: #3498db; color: white; }

        #content-frame {
            width: 100%;
            height: 80vh;
            border: none;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.95);
            display: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        /* মোডাল স্টাইল */
        .modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            z-index: 1000;
        }
        .modal h2 { color: #3498db; margin-top: 0; }
        .close-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 15px;
        }
    </style>
</head>

<div class="container">
    <h1> আপনাকে এই পেজে স্বাগতম</h1>
    
    <div class="menu-bar">
        <a href="#" onclick="showHome()">🏠 হোম</a>
        <a href="#" onclick="loadPage('GPF Subledger.html')"> জিপিএফ হিসাব </a>
        <a href="#" onclick="loadPage('VAT IT Calculator.html')"> VAT & IT </a>
        <a href="#" onclick="loadPage('envelop.html')">খাম </a>
        <a href="#" onclick="loadPage('Gratuity.html')"> আনুতোষিক ভাতা </a>
        <a onclick="showModal()" style="color: #e67e22;">📞 যোগাযোগ</a>
    </div>

    <iframe id="content-frame"></iframe>
</div>
    <div id="contactModal" class="modal">
    <h2>যোগাযোগের তথ্য</h2>
    <p><strong>Developed by:</strong> Md. Ruhul Amin, Auditor</p>
    <p><strong>Whatsapp:</strong> +8801626-537929</p>
    <button class="close-btn" onclick="closeModal()">বন্ধ করুন</button>
</div>

<script>
    function loadPage(url) {
        var frame = document.getElementById('content-frame');
        document.getElementById('contactModal').style.display = 'none';
        frame.src = url;
        frame.style.display = 'block';
    }
    
    function showHome() {
        var frame = document.getElementById('content-frame');
        document.getElementById('contactModal').style.display = 'none';
        frame.style.display = 'none';
        frame.src = '';
    }

    function showModal() {
        document.getElementById('contactModal').style.display = 'block';
        document.getElementById('content-frame').style.display = 'none';
    }

    function closeModal() {
        document.getElementById('contactModal').style.display = 'none';
    }

    function loadPage(url) {
        var frame = document.getElementById('content-frame');
        frame.src = url;
        frame.style.display = 'block';
    }
    
    function showHome() {
        var frame = document.getElementById('content-frame');
        frame.style.display = 'none';
        frame.src = '';
    }
</script>

</body>
</html>
